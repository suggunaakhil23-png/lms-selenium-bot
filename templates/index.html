<!DOCTYPE html>
<html>
<head>
    <title>LMS Credential Portal</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            width: 420px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            background: #00c6ff;
            background: linear-gradient(to right, #0072ff, #00c6ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .warning {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 0, 0, 0.2);
            border-left: 4px solid red;
            font-size: 13px;
            text-align: left;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>📚 LMS Automation Portal</h2>

    <form action="/save" method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="email" name="email" placeholder="Email" required>
        <button type="submit">Run Automation</button>
    </form>

    <div class="warning">
        ⚠️ Important: Make sure you select the correct filter (Overdue / All / Upcoming) 
        before running automation. Incorrect filter selection may result in incomplete reports in your respected LMS Accounts.
    </div>

    <div class="footer">
        Built with ❤️ using Flask & Selenium
    </div>
</div>

</body>
</html>
